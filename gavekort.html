<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>KØL Gavekort</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://bestill.online/img/s-logo.png" type="image/png">

  <style>
    :root{
      --bg:#f5f6fa;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#3F51B5;
      --green:#16a34a;
      --red:#dc2626;
      --shadow:0 10px 26px rgba(17,24,39,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:16px;
    }

    .wrap{
      width:min(460px,100%);
      margin:0 auto;
      min-height:100vh;
      padding:14px 12px 34px;
    }

    .top{
      background:var(--blue);
      color:#fff;
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
      text-align:center;
      margin-bottom:12px;
    }

    .top h1{
      margin:0;
      font-size:22px;
      line-height:1.1;
    }

    .top p{
      margin:7px 0 0;
      opacity:.9;
      font-size:13px;
    }

    .box{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:15px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .title{
      margin:0 0 6px;
      font-size:18px;
      text-align:center;
    }

    .desc{
      margin:0 0 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      text-align:center;
    }

    label{
      display:block;
      margin:12px 0 6px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    input{
      width:100%;
      height:50px;
      border:1px solid var(--line);
      border-radius:13px;
      padding:0 12px;
      background:#fff;
      outline:none;
      font-size:20px;
      font-weight:800;
      text-align:center;
      letter-spacing:4px;
    }

    input:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(63,81,181,.12);
    }

    .btn{
      width:100%;
      min-height:50px;
      margin-top:10px;
      border:0;
      border-radius:13px;
      background:var(--blue);
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }

    .btn:active{transform:translateY(1px)}

    .msg{
      margin-top:10px;
      padding:11px;
      border-radius:12px;
      font-size:14px;
      line-height:1.35;
      text-align:center;
      background:#f3f4f6;
    }
    .msg.ok{background:#dcfce7;color:#14532d}
    .msg.bad{background:#fee2e2;color:#7f1d1d}
    .msg.warn{background:#fef3c7;color:#78350f}

    .gift{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:12px;
    }

    .gift-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:14px 15px;
      background:#111827;
      color:#fff;
    }

    .name{
      margin:0;
      font-size:18px;
      line-height:1.15;
    }

    .phone{
      margin-top:4px;
      font-size:13px;
      opacity:.82;
    }

    .badge{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 9px;
      background:#dcfce7;
      color:#14532d;
      font-size:12px;
      font-weight:800;
    }

    .badge.closed{
      background:#fee2e2;
      color:#991b1b;
    }

    .gift-body{
      padding:18px 15px;
    }

    .saldo-label{
      text-align:center;
      margin:0;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .saldo{
      text-align:center;
      margin:6px 0 8px;
      font-size:46px;
      line-height:1;
      font-weight:950;
      letter-spacing:-2px;
      color:var(--blue);
    }

    .small{
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-align:center;
    }

    .live{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin:10px 0 0;
      color:#14532d;
      font-size:12px;
      font-weight:800;
    }

    .dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#16a34a;
      box-shadow:0 0 0 4px rgba(22,163,74,.13);
    }

    .qr{
      margin:15px auto 0;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      background:#f9fafb;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      padding:14px;
    }

    .qr img{
      width:172px;
      height:172px;
      background:#fff;
      padding:5px;
      border-radius:10px;
      border:1px solid #edf0f4;
    }

    .qr strong{
      display:block;
      text-align:center;
      font-size:14px;
    }

    .qr span{
      display:block;
      color:var(--muted);
      text-align:center;
      font-size:12px;
      line-height:1.35;
    }

    .history-wrap{
      margin-top:15px;
      padding-top:15px;
      border-top:1px solid var(--line);
    }

    .history-title{
      margin:0 0 10px;
      text-align:center;
      font-size:18px;
      font-weight:800;
    }

    .history{
      display:grid;
      gap:8px;
      max-height:300px;
      overflow:auto;
      padding-right:2px;
    }

    .event{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 11px;
      background:#fff;
    }

    .event strong{
      display:block;
      font-size:14px;
      line-height:1.25;
    }

    .event small{
      display:block;
      color:var(--muted);
      margin-top:3px;
      font-size:12px;
      line-height:1.35;
    }

    .empty-hist{
      color:var(--muted);
      font-size:13px;
      text-align:center;
      padding:10px 0 2px;
    }

    .hidden{display:none!important}

    .footer{
      color:#6b7280;
      font-size:12px;
      text-align:center;
      padding:8px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="top">
      <h1>KØL Gavekort</h1>
      <p>Sjekk saldo enkelt med telefonnummer</p>
    </header>

    <section id="searchBox" class="box">
      <h2 class="title">Ditt gavekort</h2>
      <p class="desc">Skriv inn telefonnummeret gavekortet er registrert på.</p>

      <label for="phoneInput">Telefonnummer</label>
      <input id="phoneInput" type="tel" inputmode="numeric" autocomplete="tel" placeholder="8 siffer" maxlength="16">

      <button class="btn" onclick="window.lookupGiftCards()">Sjekk saldo</button>
      <div id="message"></div>
    </section>

    <section id="giftList"></section>

    <div class="footer">KØL Grill & Pizza · Skarnes</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://bestill-pizza-default-rtdb.europe-west1.firebasedatabase.app"
    };

    window.fbApp = initializeApp(firebaseConfig);
    window.fbDb = getDatabase(window.fbApp);
    window.fbRef = ref;

    const db = window.fbDb;
    const PUBLIC_BASE_URL = "https://bestill.online";

    let liveUnsubs = [];
    let liveCards = {};
    let liveLogs = {};

    function cleanPhone(value){
      return String(value || "").replace(/\D/g,"").slice(-8);
    }

    function money(value){
      return new Intl.NumberFormat("no-NO", {
        style:"currency",
        currency:"NOK",
        maximumFractionDigits:0
      }).format(Number(value || 0));
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function formatDate(iso){
      if(!iso) return "-";
      try{
        return new Intl.DateTimeFormat("no-NO", {
          day:"2-digit",
          month:"2-digit",
          year:"numeric",
          hour:"2-digit",
          minute:"2-digit"
        }).format(new Date(iso));
      }catch{
        return iso;
      }
    }

    function setMessage(text,type=""){
      const el = document.getElementById("message");
      if(!text){
        el.innerHTML = "";
        return;
      }
      el.innerHTML = `<div class="msg ${type}">${escapeHtml(text)}</div>`;
    }

    function clearLiveListeners(){
      liveUnsubs.forEach(unsub => {
        try{ unsub(); }catch{}
      });
      liveUnsubs = [];
      liveCards = {};
      liveLogs = {};
    }

    function sortCards(cards){
      return cards.sort((a,b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));
    }

    function startLiveCards(cards){
      clearLiveListeners();

      cards.forEach(card => {
        liveCards[card.id] = card;
        liveLogs[card.id] = [];

        const unsubCard = onValue(ref(db, `gavekort/${card.id}`), snap => {
          if(snap.exists()){
            const updated = { id:card.id, ...snap.val() };
            if(updated.status === "deleted"){
              delete liveCards[card.id];
              delete liveLogs[card.id];
            }else{
              liveCards[card.id] = updated;
            }
            renderCards(sortCards(Object.values(liveCards)));
          }
        });

        const unsubLog = onValue(ref(db, `gavekort_logg/${card.id}`), snap => {
          const data = snap.exists() ? snap.val() : {};
          liveLogs[card.id] = Object.entries(data || {})
            .map(([id, item]) => ({ id, ...item }))
            .sort((a,b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")))
            .slice(0, 30);
          renderCards(sortCards(Object.values(liveCards)));
        });

        liveUnsubs.push(unsubCard, unsubLog);
      });

      renderCards(sortCards(cards));
    }

    function staffScanUrl(cardId){
      return `${PUBLIC_BASE_URL}/gavekort-admin.html?id=${encodeURIComponent(cardId)}`;
    }

    function qrImageUrl(cardId){
      return `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(staffScanUrl(cardId))}`;
    }

    function eventLabel(type){
      return type === "create" ? "Opprettet" :
             type === "redeem" ? "Trekk" :
             type === "topup" ? "Påfyll" :
             type === "void" ? "Stengt" :
             type === "activate" ? "Aktivert" :
             type || "Hendelse";
    }

    function historyHtml(cardId){
      const logs = liveLogs[cardId] || [];
      if(!logs.length){
        return `<div class="empty-hist">Ingen historikk ennå.</div>`;
      }

      return `
        <div class="history">
          ${logs.map(ev => `
            <div class="event">
              <strong>${escapeHtml(eventLabel(ev.type))} · ${money(ev.amount || 0)}</strong>
              <small>${formatDate(ev.createdAt)} · Før: ${money(ev.before)} · Etter: ${money(ev.after)}</small>
              ${ev.note ? `<small>${escapeHtml(ev.note)}</small>` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    async function getCardById(cardId){
      const snap = await get(ref(db, `gavekort/${cardId}`));
      if(!snap.exists()) return null;
      return { id:cardId, ...snap.val() };
    }

    async function getCardsByPhone(phone){
      const snap = await get(ref(db, "gavekort"));
      const data = snap.exists() ? snap.val() : {};
      return Object.entries(data || {})
        .map(([id, card]) => ({ id, ...card }))
        .filter(card => String(card.phone || "") === phone && card.status !== "deleted")
        .sort((a,b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));
    }

    window.lookupGiftCards = async function(){
      const phone = cleanPhone(document.getElementById("phoneInput").value);
      const list = document.getElementById("giftList");
      list.innerHTML = "";
      clearLiveListeners();

      if(phone.length !== 8){
        setMessage("Skriv et gyldig telefonnummer med 8 siffer.","bad");
        return;
      }

      localStorage.setItem("kol_gavekort_phone", phone);
      setMessage("Søker...","");

      try{
        const cards = await getCardsByPhone(phone);

        if(!cards.length){
          setMessage("Ingen gavekort funnet på dette nummeret.","warn");
          return;
        }

        setMessage("");
        startLiveCards(cards);
      }catch(err){
        console.error(err);
        setMessage("Kunne ikke hente gavekort akkurat nå.","bad");
      }
    };

    function renderCards(cards){
      const list = document.getElementById("giftList");

      if(!cards.length){
        list.innerHTML = `<div class="box"><p class="desc">Ingen aktiv gavekort.</p></div>`;
        return;
      }

      list.innerHTML = cards.map(card => {
        const active = card.status === "active";
        const statusText =
          card.status === "active" ? "Aktiv" :
          card.status === "empty" ? "Tom" :
          card.status === "void" ? "Stengt" :
          card.status || "Ukjent";

        return `
          <article class="gift">
            <div class="gift-head">
              <div>
                <h3 class="name">${escapeHtml(card.name || "Gavekort")}</h3>
                <div class="phone">Telefon: ${escapeHtml(card.phone || "")}</div>
              </div>
              <span class="badge ${active ? "" : "closed"}">${escapeHtml(statusText)}</span>
            </div>

            <div class="gift-body">
              <p class="saldo-label">Saldo</p>
              <div class="saldo">${money(card.balance)}</div>

              <div class="small">
                Opprinnelig beløp: <strong>${money(card.startAmount)}</strong><br>
                Opprettet: ${formatDate(card.createdAt)}
              </div>

              <div class="live"><span class="dot"></span> Saldo oppdateres automatisk</div>

              <div class="qr">
                <img src="${qrImageUrl(card.id)}" alt="QR-kode for gavekort">
                <div>
                  <strong>Vis QR-koden i kassen</strong>
                  <span>Ansatte skanner denne når gavekortet brukes.</span>
                </div>
              </div>

              <div class="history-wrap">
                <h3 class="history-title">Historikk</h3>
                ${historyHtml(card.id)}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function openFromUrl(){
      const params = new URLSearchParams(location.search);
      const cardId = params.get("id") || params.get("gavekort");
      const phoneParam = cleanPhone(params.get("phone") || "");

      if(phoneParam.length === 8){
        document.getElementById("phoneInput").value = phoneParam;
        window.lookupGiftCards();
        return;
      }

      if(cardId){
        document.getElementById("searchBox").classList.add("hidden");
        setMessage("");
        try{
          const card = await getCardById(cardId);
          if(!card || card.status === "deleted"){
            document.getElementById("giftList").innerHTML = `<div class="box"><p class="desc">Gavekortet ble ikke funnet.</p></div>`;
            return;
          }

          startLiveCards([card]);
        }catch(err){
          console.error(err);
          document.getElementById("giftList").innerHTML = `<div class="box"><p class="desc">Kunne ikke åpne gavekortet.</p></div>`;
        }
        return;
      }

      const savedPhone = localStorage.getItem("kol_gavekort_phone");
      if(savedPhone){
        document.getElementById("phoneInput").value = savedPhone;
        window.lookupGiftCards();
      }
    }

    document.addEventListener("input", e => {
      if(e.target.id === "phoneInput"){
        e.target.value = cleanPhone(e.target.value);
      }
    });

    document.addEventListener("keydown", e => {
      if(e.key === "Enter" && e.target.id === "phoneInput"){
        window.lookupGiftCards();
      }
    });

    openFromUrl();
  </script>
</body>
</html>
