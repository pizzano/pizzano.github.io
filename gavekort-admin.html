<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>KØL Gavekort Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="https://bestill.online/img/s-logo.png" type="image/png">

  <style>
    :root{
      --bg:#f5f6fa;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#3F51B5;
      --green:#16a34a;
      --red:#dc2626;
      --shadow:0 10px 26px rgba(17,24,39,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:16px;
    }

    button,input,textarea{font:inherit}

    .wrap{
      width:min(680px,100%);
      margin:0 auto;
      min-height:100vh;
      padding:14px 12px 34px;
    }

    .top{
      background:#111827;
      color:#fff;
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
      text-align:center;
      margin-bottom:12px;
      position:sticky;
      top:8px;
      z-index:10;
    }

    .top h1{
      margin:0;
      font-size:21px;
      line-height:1.1;
    }

    .top p{
      margin:7px 0 0;
      opacity:.82;
      font-size:13px;
    }

    .box{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:15px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .title{
      margin:0 0 6px;
      font-size:18px;
      text-align:center;
    }

    .desc{
      margin:0 0 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      text-align:center;
    }

    label{
      display:block;
      margin:12px 0 6px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    input,textarea{
      width:100%;
      min-height:48px;
      border:1px solid var(--line);
      border-radius:13px;
      padding:0 12px;
      background:#fff;
      outline:none;
      font-size:16px;
    }

    textarea{
      min-height:76px;
      padding-top:10px;
      resize:vertical;
    }

    input:focus,textarea:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(63,81,181,.12);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .grow{flex:1;min-width:0}

    .btn{
      min-height:48px;
      border:0;
      border-radius:13px;
      padding:0 13px;
      background:var(--blue);
      color:#fff;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
    }

    .btn.dark{background:#111827}
    .btn.green{background:var(--green)}
    .btn.red{background:var(--red)}
    .btn.light{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .btn:active{transform:translateY(1px)}

    .toolbar{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:12px;
    }

    .toolbar .btn{width:100%}
    .active{background:#111827!important;color:#fff!important;border-color:#111827!important}

    .hidden{display:none!important}

    .msg{
      margin-top:10px;
      padding:11px;
      border-radius:12px;
      font-size:14px;
      line-height:1.35;
      text-align:center;
      background:#f3f4f6;
    }
    .msg.ok{background:#dcfce7;color:#14532d}
    .msg.bad{background:#fee2e2;color:#7f1d1d}
    .msg.warn{background:#fef3c7;color:#78350f}

    .gift{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:12px;
    }

    .gift-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:14px 15px;
      background:var(--blue);
      color:#fff;
    }

    .name{
      margin:0;
      font-size:18px;
      line-height:1.15;
    }

    .phone{
      margin-top:4px;
      font-size:13px;
      opacity:.82;
    }

    .badge{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 9px;
      background:#dcfce7;
      color:#14532d;
      font-size:12px;
      font-weight:800;
    }

    .badge.closed{background:#fee2e2;color:#991b1b}

    .gift-body{padding:16px 15px}

    .saldo{
      text-align:center;
      margin:0 0 8px;
      font-size:44px;
      line-height:1;
      font-weight:950;
      letter-spacing:-2px;
      color:var(--blue);
    }

    .small{
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      text-align:center;
    }

    .divider{
      height:1px;
      background:var(--line);
      margin:15px 0;
    }

    .mini-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .link-line{
      display:flex;
      gap:8px;
      margin-top:8px;
    }

    .link-line input{
      min-height:42px;
      font-size:12px;
      color:#3730a3;
      background:#eef2ff;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:9px;
    }

    .actions .btn{
      min-height:40px;
      font-size:13px;
      padding:0 10px;
    }

    .history{
      display:grid;
      gap:7px;
      max-height:230px;
      overflow:auto;
      padding-right:4px;
    }

    .event{
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 10px;
      background:#fff;
    }

    .event strong{
      display:block;
      font-size:14px;
    }

    .event small{
      display:block;
      color:var(--muted);
      margin-top:2px;
      font-size:12px;
    }

    .remember{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:center;
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }

    .remember input{
      width:auto;
      min-height:auto;
    }

    .footer{
      color:#6b7280;
      font-size:12px;
      text-align:center;
      padding:8px;
    }

    @media(max-width:560px){
      .row,.link-line{flex-direction:column;align-items:stretch}
      .btn{width:100%}
      .saldo{font-size:39px}
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="top">
      <h1>Gavekort Admin</h1>
      <p>Opprett, fyll på og trekk saldo</p>
    </header>

    <section id="loginBox" class="box">
      <h2 class="title">Logg inn</h2>
      <p id="loginText" class="desc">Skriv PIN én gang. Den lagres på denne enheten.</p>

      <label for="pinInput">PIN</label>
      <div class="row">
        <input id="pinInput" class="grow" type="password" inputmode="numeric" autocomplete="current-password" placeholder="PIN">
        <button class="btn dark" onclick="window.login()">Logg inn</button>
      </div>

      <label class="remember">
        <input id="rememberPin" type="checkbox" checked>
        Husk innlogging på denne enheten
      </label>
    </section>

    <section id="adminApp" class="hidden">
      <div class="toolbar">
        <button id="tabCreate" class="btn active" onclick="window.showPanel('createPanel')">Nytt gavekort</button>
        <button id="tabSearch" class="btn light" onclick="window.showPanel('searchPanel')">Søk / trekk</button>
      </div>

      <section id="createPanel" class="box">
        <h2 class="title">Nytt gavekort</h2>
        <p class="desc">Fyll inn kunde og beløp.</p>

        <label for="newPhone">Telefonnummer</label>
        <input id="newPhone" inputmode="numeric" placeholder="97470949" maxlength="16">

        <label for="newName">Navn</label>
        <input id="newName" placeholder="Kundens navn">

        <label for="newAmount">Beløp</label>
        <input id="newAmount" inputmode="decimal" placeholder="1000">

        <label for="newNote">Notat</label>
        <textarea id="newNote" placeholder="Betalt / gavekort"></textarea>

        <button class="btn green" style="width:100%;margin-top:12px" onclick="window.createGiftCard()">Opprett</button>
        <div id="createMsg"></div>
      </section>

      <section id="searchPanel" class="box hidden">
        <h2 class="title">Finn gavekort</h2>
        <p class="desc">Søk med telefonnummer, ID eller skannet lenke.</p>

        <label for="searchInput">Søk</label>
        <div class="row">
          <input id="searchInput" class="grow" placeholder="Telefon / ID / lenke">
          <button class="btn" onclick="window.searchGiftCards()">Søk</button>
        </div>

        <div id="searchMsg"></div>
      </section>

      <section id="resultList"></section>

      <div class="actions" style="justify-content:center">
        <button class="btn light" onclick="window.logout()">Logg ut / glem PIN</button>
      </div>
    </section>

    <div class="footer">Database: gavekort</div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getDatabase, ref, set, get, push, update } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://bestill-pizza-default-rtdb.europe-west1.firebasedatabase.app"
    };

    window.fbApp = initializeApp(firebaseConfig);
    window.fbDb = getDatabase(window.fbApp);
    window.fbRef = ref;
    window.fbSet = set;

    const db = window.fbDb;
    const PUBLIC_BASE_URL = "https://bestill.online";
    const ADMIN_PIN = "2026";

    let loggedIn = false;
    let pendingCardId = null;
    const cardCache = {};

    function cleanPhone(value){
      return String(value || "").replace(/\D/g,"").slice(-8);
    }

    function cleanAmount(value){
      const n = Number(String(value || "").replace(",",".").replace(/[^\d.]/g,""));
      return Number.isFinite(n) ? Math.round(n) : 0;
    }

    function nowIso(){
      return new Date().toISOString();
    }

    function money(value){
      return new Intl.NumberFormat("no-NO", {
        style:"currency",
        currency:"NOK",
        maximumFractionDigits:0
      }).format(Number(value || 0));
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function jsArg(str){
      return String(str || "")
        .replaceAll("\\","\\\\")
        .replaceAll("'","\\'")
        .replaceAll("\n","\\n")
        .replaceAll("\r","");
    }

    function formatDate(iso){
      if(!iso) return "-";
      try{
        return new Intl.DateTimeFormat("no-NO", {
          day:"2-digit",
          month:"2-digit",
          year:"numeric",
          hour:"2-digit",
          minute:"2-digit"
        }).format(new Date(iso));
      }catch{
        return iso;
      }
    }

    function setMsg(id,text,type=""){
      const el = document.getElementById(id);
      if(!el) return;
      if(!text){
        el.innerHTML = "";
        return;
      }
      el.innerHTML = `<div class="msg ${type}">${escapeHtml(text)}</div>`;
    }

    function customerUrl(cardId){
      return `${PUBLIC_BASE_URL}/gavekort.html?id=${encodeURIComponent(cardId)}`;
    }

    function adminUrl(cardId){
      return `${PUBLIC_BASE_URL}/gavekort-admin.html?id=${encodeURIComponent(cardId)}`;
    }

    function extractCardId(text){
      const raw = String(text || "").trim();
      if(!raw) return "";

      try{
        if(raw.includes("http://") || raw.includes("https://")){
          const url = new URL(raw);
          return url.searchParams.get("id") || url.searchParams.get("gavekort") || "";
        }
      }catch{}

      if(raw.startsWith("KOL-GAVEKORT:")) return raw.replace("KOL-GAVEKORT:","").trim();
      return raw;
    }

    async function addLog(cardId,event){
      const logRef = push(ref(db, `gavekort_logg/${cardId}`));
      await set(logRef, {
        ...event,
        createdAt:nowIso()
      });
    }

    async function getCard(cardId){
      const snap = await get(ref(db, `gavekort/${cardId}`));
      if(!snap.exists()) return null;
      return { id:cardId, ...snap.val() };
    }

    async function getLogs(cardId){
      const snap = await get(ref(db, `gavekort_logg/${cardId}`));
      const data = snap.exists() ? snap.val() : {};
      return Object.entries(data || {})
        .map(([id,item]) => ({ id, ...item }))
        .sort((a,b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")))
        .slice(0,20);
    }

    async function getAllCards(){
      const snap = await get(ref(db, "gavekort"));
      const data = snap.exists() ? snap.val() : {};
      return Object.entries(data || {})
        .map(([id,card]) => ({ id, ...card }))
        .filter(card => card.status !== "deleted")
        .sort((a,b) => String(b.createdAt || "").localeCompare(String(a.createdAt || "")));
    }

    async function findCardsByPhone(phone){
      const all = await getAllCards();
      return all.filter(card => String(card.phone || "") === phone);
    }

    window.login = async function(){
      const pin = document.getElementById("pinInput").value.trim();

      if(pin !== ADMIN_PIN){
        alert("Feil PIN");
        return;
      }

      if(document.getElementById("rememberPin").checked){
        localStorage.setItem("kol_gavekort_admin_ok","yes");
        localStorage.setItem("kol_gavekort_admin_pin",pin);
      }

      await enterAdmin();
    };

    async function enterAdmin(){
      loggedIn = true;
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("adminApp").classList.remove("hidden");

      if(pendingCardId){
        window.showPanel("searchPanel");
        await openCardById(pendingCardId);
      }else{
        window.showPanel("createPanel");
      }
    }

    window.logout = function(){
      localStorage.removeItem("kol_gavekort_admin_ok");
      localStorage.removeItem("kol_gavekort_admin_pin");
      location.href = location.pathname;
    };

    window.showPanel = function(panelId){
      document.getElementById("createPanel").classList.toggle("hidden", panelId !== "createPanel");
      document.getElementById("searchPanel").classList.toggle("hidden", panelId !== "searchPanel");
      document.getElementById("tabCreate").classList.toggle("active", panelId === "createPanel");
      document.getElementById("tabSearch").classList.toggle("active", panelId === "searchPanel");
    };

    window.createGiftCard = async function(){
      if(!loggedIn) return;

      const phone = cleanPhone(document.getElementById("newPhone").value);
      const name = document.getElementById("newName").value.trim();
      const amount = cleanAmount(document.getElementById("newAmount").value);
      const note = document.getElementById("newNote").value.trim();

      if(phone.length !== 8){
        setMsg("createMsg","Telefonnummer må ha 8 siffer.","bad");
        return;
      }

      if(!name){
        setMsg("createMsg","Skriv kundens navn.","bad");
        return;
      }

      if(amount <= 0){
        setMsg("createMsg","Beløp må være over 0 kr.","bad");
        return;
      }

      const cardRef = push(ref(db, "gavekort"));
      const cardId = cardRef.key;

      const card = {
        phone,
        name,
        startAmount:amount,
        balance:amount,
        status:"active",
        note,
        createdAt:nowIso(),
        updatedAt:nowIso()
      };

      try{
        await set(cardRef, card);
        await addLog(cardId, {
          type:"create",
          amount,
          before:0,
          after:amount,
          note:note || "Gavekort opprettet",
          by:"admin"
        });

        setMsg("createMsg",`Gavekort opprettet: ${money(amount)} til ${name}.`,"ok");

        document.getElementById("newPhone").value = "";
        document.getElementById("newName").value = "";
        document.getElementById("newAmount").value = "";
        document.getElementById("newNote").value = "";

        window.showPanel("searchPanel");
        renderCards([ { id:cardId, ...card } ]);
      }catch(err){
        console.error(err);
        setMsg("createMsg","Kunne ikke opprette gavekort. Sjekk Firebase Rules.","bad");
      }
    };

    window.searchGiftCards = async function(){
      if(!loggedIn) return;

      const input = document.getElementById("searchInput").value.trim();
      const phone = cleanPhone(input);
      document.getElementById("resultList").innerHTML = "";

      if(!input){
        setMsg("searchMsg","Skriv telefonnummer, ID eller lenke.","bad");
        return;
      }

      setMsg("searchMsg","Søker...","");

      try{
        let cards = [];

        if(phone.length === 8 && !input.startsWith("-")){
          cards = await findCardsByPhone(phone);
        }

        if(!cards.length){
          const cardId = extractCardId(input);
          const card = await getCard(cardId);
          if(card) cards = [card];
        }

        if(!cards.length){
          setMsg("searchMsg","Ingen gavekort funnet.","warn");
          return;
        }

        setMsg("searchMsg","");
        renderCards(cards);
      }catch(err){
        console.error(err);
        setMsg("searchMsg","Kunne ikke søke.","bad");
      }
    };

    async function openCardById(cardId){
      setMsg("searchMsg","Åpner gavekort...","");
      document.getElementById("resultList").innerHTML = "";

      try{
        const card = await getCard(cardId);
        if(!card){
          setMsg("searchMsg","Gavekort ikke funnet.","bad");
          return;
        }

        setMsg("searchMsg","");
        renderCards([card]);
      }catch(err){
        console.error(err);
        setMsg("searchMsg","Kunne ikke åpne gavekort.","bad");
      }
    }

    window.redeem = async function(cardId){
      if(!loggedIn) return;

      const amount = cleanAmount(document.getElementById(`redeem-${cardId}`).value);
      const note = document.getElementById(`redeemNote-${cardId}`).value.trim();

      if(amount <= 0){
        alert("Skriv beløp over 0 kr.");
        return;
      }

      try{
        const card = await getCard(cardId);

        if(!card){
          alert("Gavekort ikke funnet.");
          return;
        }

        if(card.status !== "active"){
          alert("Gavekortet er ikke aktivt.");
          return;
        }

        const before = Number(card.balance || 0);

        if(amount > before){
          alert(`Beløpet er høyere enn saldo. Saldo er ${money(before)}.`);
          return;
        }

        const after = before - amount;

        await update(ref(db, `gavekort/${cardId}`), {
          balance:after,
          status:after <= 0 ? "empty" : "active",
          updatedAt:nowIso()
        });

        await addLog(cardId, {
          type:"redeem",
          amount,
          before,
          after,
          note:note || "Brukt i kassen",
          by:"admin"
        });

        alert(`Trukket ${money(amount)}. Ny saldo: ${money(after)}.`);
        await refreshCard(cardId);
      }catch(err){
        console.error(err);
        alert("Kunne ikke trekke fra saldo.");
      }
    };

    window.topup = async function(cardId){
      if(!loggedIn) return;

      const amount = cleanAmount(document.getElementById(`topup-${cardId}`).value);

      if(amount <= 0){
        alert("Skriv beløp over 0 kr.");
        return;
      }

      try{
        const card = await getCard(cardId);

        if(!card){
          alert("Gavekort ikke funnet.");
          return;
        }

        const before = Number(card.balance || 0);
        const after = before + amount;

        await update(ref(db, `gavekort/${cardId}`), {
          balance:after,
          status:"active",
          updatedAt:nowIso()
        });

        await addLog(cardId, {
          type:"topup",
          amount,
          before,
          after,
          note:"Påfyll",
          by:"admin"
        });

        alert(`Fylt på ${money(amount)}. Ny saldo: ${money(after)}.`);
        await refreshCard(cardId);
      }catch(err){
        console.error(err);
        alert("Kunne ikke fylle på gavekort.");
      }
    };

    window.voidCard = async function(cardId){
      if(!loggedIn) return;
      if(!confirm("Vil du stenge dette gavekortet?")) return;

      try{
        const card = await getCard(cardId);
        if(!card) return;

        await update(ref(db, `gavekort/${cardId}`), {
          status:"void",
          updatedAt:nowIso()
        });

        await addLog(cardId, {
          type:"void",
          amount:0,
          before:Number(card.balance || 0),
          after:Number(card.balance || 0),
          note:"Gavekort stengt",
          by:"admin"
        });

        alert("Gavekortet er stengt.");
        await refreshCard(cardId);
      }catch(err){
        console.error(err);
        alert("Kunne ikke stenge gavekort.");
      }
    };

    window.activateCard = async function(cardId){
      if(!loggedIn) return;

      try{
        const card = await getCard(cardId);
        if(!card) return;

        await update(ref(db, `gavekort/${cardId}`), {
          status:"active",
          updatedAt:nowIso()
        });

        await addLog(cardId, {
          type:"activate",
          amount:0,
          before:Number(card.balance || 0),
          after:Number(card.balance || 0),
          note:"Gavekort aktivert",
          by:"admin"
        });

        alert("Gavekortet er aktivert.");
        await refreshCard(cardId);
      }catch(err){
        console.error(err);
        alert("Kunne ikke aktivere gavekort.");
      }
    };

    window.copyCustomerLink = async function(cardId){
      await copyText(customerUrl(cardId));
      setMsg("searchMsg","Kundelink kopiert.","ok");
    };

    window.copySmsText = async function(cardId){
      const card = cardCache[cardId] || {};
      const namePart = card.name ? ` ${card.name}` : "";
      const text = `Hei${namePart}! Her kan du se gavekortet ditt hos KØL Grill & Pizza: ${customerUrl(cardId)}\n\nMvh KØL Grill & Pizza`;
      await copyText(text);
      setMsg("searchMsg","SMS-tekst kopiert.","ok");
    };

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
      }catch{
        prompt("Kopier denne teksten:", text);
      }
    }

    async function refreshCard(cardId){
      const card = await getCard(cardId);
      const old = document.querySelector(`[data-card-id="${CSS.escape(cardId)}"]`);
      if(!old || !card) return;

      const wrapper = document.createElement("div");
      wrapper.innerHTML = buildCard(card);
      const fresh = wrapper.firstElementChild;
      old.replaceWith(fresh);
      await hydrateCard(fresh, card);
    }

    function renderCards(cards){
      document.getElementById("resultList").innerHTML = cards.map(card => buildCard(card)).join("");

      cards.forEach(card => {
        const node = document.querySelector(`[data-card-id="${CSS.escape(card.id)}"]`);
        if(node) hydrateCard(node, card);
      });
    }

    function buildCard(card){
      cardCache[card.id] = card;

      const active = card.status === "active";
      const statusText =
        card.status === "active" ? "Aktiv" :
        card.status === "empty" ? "Tom" :
        card.status === "void" ? "Stengt" :
        card.status || "Ukjent";

      const cUrl = customerUrl(card.id);

      return `
        <article class="gift" data-card-id="${escapeHtml(card.id)}">
          <div class="gift-head">
            <div>
              <h3 class="name">${escapeHtml(card.name || "Gavekort")}</h3>
              <div class="phone">Telefon: ${escapeHtml(card.phone || "")}</div>
            </div>
            <span class="badge ${active ? "" : "closed"}">${escapeHtml(statusText)}</span>
          </div>

          <div class="gift-body">
            <div class="saldo">${money(card.balance)}</div>
            <div class="small">
              Start: <strong>${money(card.startAmount)}</strong> · ID: ${escapeHtml(card.id)}
              ${card.note ? `<br>Notat: ${escapeHtml(card.note)}` : ""}
            </div>

            <div class="divider"></div>

            <label>Kundelink / SMS</label>
            <div class="link-line">
              <input readonly value="${escapeHtml(cUrl)}" onclick="this.select()">
              <button class="btn green" onclick="window.copyCustomerLink('${jsArg(card.id)}')">Kopier link</button>
              <button class="btn" onclick="window.copySmsText('${jsArg(card.id)}')">SMS tekst</button>
            </div>

            <div class="divider"></div>

            <div class="mini-grid">
              <div>
                <label for="redeem-${escapeHtml(card.id)}">Trekk fra saldo</label>
                <div class="row">
                  <input id="redeem-${escapeHtml(card.id)}" class="grow" inputmode="decimal" placeholder="Beløp" ${!active ? "disabled" : ""}>
                  <button class="btn green" onclick="window.redeem('${jsArg(card.id)}')" ${!active ? "disabled" : ""}>Trekk</button>
                </div>
              </div>

              <div>
                <label for="redeemNote-${escapeHtml(card.id)}">Notat</label>
                <input id="redeemNote-${escapeHtml(card.id)}" placeholder="f.eks. ordre / pizza" ${!active ? "disabled" : ""}>
              </div>

              <div>
                <label for="topup-${escapeHtml(card.id)}">Fyll på</label>
                <div class="row">
                  <input id="topup-${escapeHtml(card.id)}" class="grow" inputmode="decimal" placeholder="Beløp">
                  <button class="btn light" onclick="window.topup('${jsArg(card.id)}')">Fyll på</button>
                </div>
              </div>
            </div>

            <div class="actions">
              <button class="btn light" onclick="window.activateCard('${jsArg(card.id)}')">Aktiver</button>
              <button class="btn red" onclick="window.voidCard('${jsArg(card.id)}')">Steng</button>
            </div>

            <div class="divider"></div>

            <h3 class="title" style="font-size:15px">Historikk</h3>
            <div class="history" data-history-for="${escapeHtml(card.id)}">
              <div class="small">Laster...</div>
            </div>
          </div>
        </article>
      `;
    }

    async function hydrateCard(node, card){
      const history = node.querySelector(`[data-history-for="${CSS.escape(card.id)}"]`);
      if(!history) return;

      try{
        const logs = await getLogs(card.id);

        if(!logs.length){
          history.innerHTML = `<div class="small">Ingen historikk.</div>`;
          return;
        }

        history.innerHTML = logs.map(ev => {
          const label =
            ev.type === "create" ? "Opprettet" :
            ev.type === "redeem" ? "Trekk" :
            ev.type === "topup" ? "Påfyll" :
            ev.type === "void" ? "Stengt" :
            ev.type === "activate" ? "Aktivert" :
            ev.type || "Hendelse";

          return `
            <div class="event">
              <strong>${escapeHtml(label)} · ${money(ev.amount || 0)}</strong>
              <small>${formatDate(ev.createdAt)} · Før: ${money(ev.before)} · Etter: ${money(ev.after)}</small>
              ${ev.note ? `<small>${escapeHtml(ev.note)}</small>` : ""}
            </div>
          `;
        }).join("");
      }catch{
        history.innerHTML = `<div class="msg bad">Historikk kunne ikke lastes.</div>`;
      }
    }

    async function init(){
      const params = new URLSearchParams(location.search);
      pendingCardId = params.get("id") || params.get("gavekort");

      if(pendingCardId){
        document.getElementById("loginText").textContent = "QR-kode lest. Logg inn for å trekke saldo.";
      }

      const savedOk = localStorage.getItem("kol_gavekort_admin_ok") === "yes";
      const savedPin = localStorage.getItem("kol_gavekort_admin_pin");

      if(savedOk && savedPin === ADMIN_PIN){
        document.getElementById("pinInput").value = savedPin;
        await enterAdmin();
      }
    }

    document.addEventListener("input", e => {
      if(e.target.id === "newPhone"){
        e.target.value = cleanPhone(e.target.value);
      }
    });

    document.addEventListener("keydown", e => {
      if(e.key !== "Enter") return;
      if(e.target.id === "pinInput") window.login();
      if(e.target.id === "searchInput") window.searchGiftCards();
    });

    init();
  </script>
</body>
</html>
